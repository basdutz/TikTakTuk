{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manajemen Tiket – TikTakTuk</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Nunito',sans-serif;background:#F9FAFB;min-height:100vh;padding:0;overflow-x:hidden;}
    .wrap{width:100%;padding:24px 24px 32px;}

    .page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;}
    .page-header-left h1{font-size:24px;font-weight:900;color:#1a1a1a;margin-bottom:4px;}
    .page-header-left .sub{font-size:13px;color:#aaa;font-weight:600;}
    .add-btn{padding:9px 18px;background:#f47c20;color:#fff;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:6px;transition:opacity .15s;white-space:nowrap;}
    .add-btn:hover{opacity:.85;}

    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;}
    .scard{background:#fff;border-radius:14px;padding:20px 24px;box-shadow:0 2px 12px rgba(0,0,0,.06);}
    .scard-label{font-size:11px;font-weight:800;color:#aaa;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;}
    .scard-val{font-size:28px;font-weight:900;color:#1a1a1a;}

    .filters{display:flex;gap:10px;margin-bottom:16px;}
    .search-box{flex:1;position:relative;}
    .search-box input{width:100%;padding:9px 14px 9px 36px;border:1.5px solid #e5e5e5;border-radius:10px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;color:#333;outline:none;transition:border-color .15s;}
    .search-box input:focus{border-color:#f47c20;}
    .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#aaa;}
    .filter-select{padding:9px 14px;border:1.5px solid #e5e5e5;border-radius:10px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;color:#555;background:#fff;outline:none;cursor:pointer;}
    .filter-select:focus{border-color:#f47c20;}

    .tickets-list{display:flex;flex-direction:column;gap:12px;}
    .tkt-card{background:#fff;border-radius:16px;padding:20px 24px;box-shadow:0 2px 12px rgba(0,0,0,.06);display:grid;grid-template-columns:48px 1fr;gap:16px;align-items:start;}
    .tkt-icon{width:48px;height:48px;background:#4f46e5;border-radius:12px;display:flex;align-items:center;justify-content:center;}
    .tkt-icon svg{width:24px;height:24px;color:#fff;}

    .tkt-badges{display:flex;gap:6px;margin-bottom:6px;}
    .badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;}
    .badge-valid{background:#d1fae5;color:#065f46;}
    .badge-terpakai{background:#fee2e2;color:#991b1b;}
    .badge-vip{background:#ede9fe;color:#5b21b6;}
    .badge-wvip{background:#fce7f3;color:#9d174d;}
    .badge-reg{background:#d1fae5;color:#065f46;}
    .badge-ga{background:#dbeafe;color:#1e40af;}

    .tkt-name{font-size:15px;font-weight:900;color:#1a1a1a;margin-bottom:2px;}
    .tkt-code{font-size:11px;color:#aaa;font-family:monospace;margin-bottom:12px;}

    .tkt-meta{display:grid;grid-template-columns:repeat(3,1fr);gap:8px 16px;}
    .meta-label{font-size:10px;font-weight:800;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
    .meta-val{font-size:13px;font-weight:700;color:#1a1a1a;}

    .tkt-actions{display:flex;gap:8px;margin-top:12px;}
    .btn-update{padding:6px 14px;background:#fff;border:1.5px solid #e5e5e5;border-radius:9px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;color:#555;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;}
    .btn-update:hover{border-color:#f47c20;color:#f47c20;}
    .btn-hapus{padding:6px 14px;background:#fff;border:1.5px solid #fee2e2;border-radius:9px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;color:#dc2626;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;}
    .btn-hapus:hover{background:#fee2e2;}

    .empty{text-align:center;padding:48px 24px;color:#aaa;font-weight:600;}

    /* MODAL */
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;}
    .overlay.active{display:flex;}
    .modal{background:#fff;border-radius:20px;padding:28px;width:100%;max-width:480px;box-shadow:0 8px 40px rgba(0,0,0,.18);}
    .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
    .modal-title{font-size:17px;font-weight:900;color:#1a1a1a;}
    .close-btn{background:none;border:none;font-size:20px;color:#aaa;cursor:pointer;padding:2px 6px;border-radius:6px;}
    .close-btn:hover{color:#1a1a1a;}
    .field{margin-bottom:18px;}
    .field-label{font-size:11px;font-weight:800;color:#aaa;text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px;display:block;}
    .field-label .opt{font-weight:600;color:#ccc;text-transform:none;letter-spacing:0;font-size:11px;}
    .field select,.field input{width:100%;padding:11px 14px;border:1.5px solid #e5e5e5;border-radius:10px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;color:#333;background:#fff;outline:none;transition:border-color .15s;appearance:none;-webkit-appearance:none;}
    .field select:focus,.field input:focus{border-color:#f47c20;}
    .field select:disabled{background:#f9f9f9;color:#bbb;cursor:not-allowed;}
    .select-wrap{position:relative;}
    .select-wrap::after{content:'▾';position:absolute;right:13px;top:50%;transform:translateY(-50%);color:#aaa;pointer-events:none;}
    .field input[readonly]{background:#f9f9f9;color:#aaa;cursor:not-allowed;font-family:monospace;font-size:12px;}
    .field input::placeholder{color:#bbb;}
    .modal-footer{display:flex;gap:10px;margin-top:24px;}
    .btn-batal{flex:1;padding:12px;border:1.5px solid #e5e5e5;border-radius:12px;background:#fff;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:#555;cursor:pointer;}
    .btn-batal:hover{border-color:#aaa;}
    .btn-buat{flex:1.5;padding:12px;border:none;border-radius:12px;background:#f47c20;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;color:#fff;cursor:pointer;}
    .btn-buat:hover{opacity:.85;}
    .hidden{display:none;}

    @media(max-width:700px){.stats{grid-template-columns:repeat(3,1fr);}.tkt-meta{grid-template-columns:repeat(2,1fr);}.filters{flex-direction:column;}.page-header{flex-direction:column;gap:12px;}}
  </style>
</head>
<body>
{% include 'main/navbar.html' %}
<div class="wrap">

  <div class="page-header">
    <div class="page-header-left">
      <h1>Manajemen Tiket</h1>
      <div class="sub">Kelola tiket: tambah, ubah status, dan hapus tiket</div>
    </div>
    <button class="add-btn" onclick="openModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Tambah Tiket
    </button>
  </div>

  <div class="stats">
    <div class="scard"><div class="scard-label">Total Tiket</div><div class="scard-val" id="statTotal">0</div></div>
    <div class="scard"><div class="scard-label">Valid</div><div class="scard-val" id="statValid">0</div></div>
    <div class="scard"><div class="scard-label">Terpakai</div><div class="scard-val" id="statTerpakai">0</div></div>
  </div>

  <div class="filters">
    <div class="search-box">
      <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Cari kode tiket atau nama acara..." oninput="applyFilters()"/>
    </div>
    <select class="filter-select" id="filterStatus" onchange="applyFilters()">
      <option value="">Semua Status</option>
      <option value="valid">Valid</option>
      <option value="terpakai">Terpakai</option>
    </select>
  </div>

  <div class="tickets-list" id="ticketsList"></div>
</div>

<!-- MODAL TAMBAH -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-head">
      <span class="modal-title">Tambah Tiket Baru</span>
      <button class="close-btn" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="field">
      <label class="field-label">Order</label>
      <div class="select-wrap">
        <select id="orderSelect" onchange="handleOrderChange()">
          <option value="">— Pilih Order —</option>
          <option value="ord_001|Budi Santoso|Konser Melodi Senja|reserved">ord_001 — Budi Santoso — Konser Melodi Senja</option>
          <option value="ord_002|Budi Santoso|Festival Seni Budaya|no-reserved">ord_002 — Budi Santoso — Festival Seni Budaya</option>
          <option value="ord_003|Siti Rahayu|Malam Akustik Bandung|reserved">ord_003 — Siti Rahayu — Malam Akustik Bandung</option>
          <option value="ord_004|Agus Setiawan|Festival Seni Budaya|no-reserved">ord_004 — Agus Setiawan — Festival Seni Budaya</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label class="field-label">Kategori Tiket</label>
      <div class="select-wrap">
        <select id="categorySelect" disabled>
          <option value="">— Pilih order terlebih dahulu —</option>
        </select>
      </div>
    </div>
    <div class="field hidden" id="seatField">
      <label class="field-label">Kursi <span class="opt">(opsional — reserved seating)</span></label>
      <div class="select-wrap">
        <select id="seatSelect"><option value="">— Pilih Kursi —</option></select>
      </div>
    </div>
    <div class="field">
      <label class="field-label">Kode Tiket</label>
      <input type="text" id="kodePreview" readonly placeholder="Auto-generate saat dibuat"/>
    </div>
    <div class="modal-footer">
      <button class="btn-batal" onclick="closeModal()">Batal</button>
      <button class="btn-buat" onclick="buatTiket()">Buat Tiket</button>
    </div>
  </div>
</div>

<!-- MODAL UPDATE STATUS -->
<div class="overlay" id="overlayUpdate" onclick="if(event.target===this)closeUpdate()">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">Update Status Tiket</span>
      <button class="close-btn" onclick="closeUpdate()">&#x2715;</button>
    </div>
    <div class="field">
      <label class="field-label">Kode Tiket</label>
      <input type="text" id="updateKode" readonly/>
    </div>
    <div class="field">
      <label class="field-label">Status</label>
      <div class="select-wrap">
        <select id="updateStatus">
          <option value="valid">Valid</option>
          <option value="terpakai">Terpakai</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-batal" onclick="closeUpdate()">Batal</button>
      <button class="btn-buat" onclick="simpanUpdate()">Simpan</button>
    </div>
  </div>
</div>

<script>
  let tikets = [
    {kode:'TTK-EVT001-VIP-001', event:'Konser Melodi Senja',   kategori:'VIP',              status:'valid',    jadwal:'2024-05-15 19:00', lokasi:'Jakarta Convention Center', kursi:'VIP B-1', harga:'Rp 750.000', orderId:'ord_001', pelanggan:'Budi Santoso'},
    {kode:'TTK-EVT001-VIP-002', event:'Konser Melodi Senja',   kategori:'VIP',              status:'valid',    jadwal:'2024-05-15 19:00', lokasi:'Jakarta Convention Center', kursi:'VIP B-2', harga:'Rp 750.000', orderId:'ord_001', pelanggan:'Budi Santoso'},
    {kode:'TTK-EVT002-GA-001',  event:'Festival Seni Budaya',  kategori:'General Admission',status:'terpakai', jadwal:'2024-06-20 14:00', lokasi:'Taman Impian Jayakarta',    kursi:'—',       harga:'Rp 150.000', orderId:'ord_002', pelanggan:'Budi Santoso'},
    {kode:'TTK-EVT003-REG-001', event:'Malam Akustik Bandung', kategori:'Regular',          status:'valid',    jadwal:'2024-07-10 20:00', lokasi:'Bandung Hall Center',       kursi:'Cat.2 — Baris F, No. 7', harga:'Rp 200.000', orderId:'ord_003', pelanggan:'Siti Rahayu'},
  ];

  const kategoriMap = {
    'Konser Melodi Senja':   [{label:'WVIP — Rp 1.500.000 (2/50)',val:'WVIP',disabled:false},{label:'VIP — Rp 750.000 (3/150)',val:'VIP',disabled:false},{label:'Regular — Rp 300.000 (150/150)',val:'Regular',disabled:true}],
    'Festival Seni Budaya':  [{label:'General Admission — Rp 150.000 (1/500)',val:'General Admission',disabled:false},{label:'VIP — Rp 500.000 (50/50)',val:'VIP',disabled:true}],
    'Malam Akustik Bandung': [{label:'Regular — Rp 200.000 (10/200)',val:'Regular',disabled:false},{label:'VIP — Rp 600.000 (5/100)',val:'VIP',disabled:false}],
  };
  const seatMap = {
    'Konser Melodi Senja':   ['Category 1 — Baris A, No. 1','Category 1 — Baris A, No. 2','Category 1 — Baris C, No. 2','Category 2 — Baris E, No. 4'],
    'Malam Akustik Bandung': ['Category 1 — Baris B, No. 1','Category 2 — Baris D, No. 5'],
  };
  const badgeKat = {'VIP':'badge-vip','WVIP':'badge-wvip','Regular':'badge-reg','General Admission':'badge-ga'};

  function generateKode() {
    const c='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'; let k='TTK-';
    for(let i=0;i<8;i++) k+=c[Math.floor(Math.random()*c.length)];
    return k;
  }

  function cardHTML(t) {
    const statusBadge = t.status==='valid'
      ? '<span class="badge badge-valid">Valid</span>'
      : '<span class="badge badge-terpakai">Terpakai</span>';
    const katBadge = `<span class="badge ${badgeKat[t.kategori]||''}">${t.kategori}</span>`;
    return `<div class="tkt-card">
      <div class="tkt-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/>
          <path d="M13 5v2"/><path d="M13 17v2"/><path d="M13 11v2"/>
        </svg>
      </div>
      <div class="tkt-main">
        <div class="tkt-badges">${statusBadge}${katBadge}</div>
        <div class="tkt-name">${t.event}</div>
        <div class="tkt-code">${t.kode}</div>
        <div class="tkt-meta">
          <div class="meta-item"><div class="meta-label">Jadwal</div><div class="meta-val">${t.jadwal}</div></div>
          <div class="meta-item"><div class="meta-label">Lokasi</div><div class="meta-val">${t.lokasi}</div></div>
          <div class="meta-item"><div class="meta-label">Kursi</div><div class="meta-val">${t.kursi}</div></div>
          <div class="meta-item"><div class="meta-label">Harga</div><div class="meta-val">${t.harga}</div></div>
          <div class="meta-item"><div class="meta-label">Order</div><div class="meta-val">${t.orderId}</div></div>
          <div class="meta-item"><div class="meta-label">Pelanggan</div><div class="meta-val">${t.pelanggan}</div></div>
        </div>
        <div class="tkt-actions">
          <button class="btn-update" onclick="openUpdate('${t.kode}')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Update
          </button>
          <button class="btn-hapus" onclick="hapus('${t.kode}')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            Hapus
          </button>
        </div>
      </div>
    </div>`;
  }

  function updateStats(data) {
    document.getElementById('statTotal').textContent = data.length;
    document.getElementById('statValid').textContent = data.filter(t=>t.status==='valid').length;
    document.getElementById('statTerpakai').textContent = data.filter(t=>t.status==='terpakai').length;
  }

  function applyFilters() {
    const q  = document.getElementById('searchInput').value.toLowerCase();
    const st = document.getElementById('filterStatus').value;
    const result = tikets.filter(t =>
      (!q  || t.kode.toLowerCase().includes(q) || t.event.toLowerCase().includes(q)) &&
      (!st || t.status === st)
    );
    updateStats(result);
    const list = document.getElementById('ticketsList');
    list.innerHTML = result.length ? result.map(cardHTML).join('') : '<div class="empty">Tidak ada tiket ditemukan.</div>';
  }

  function hapus(kode) {
    if (!confirm('Hapus tiket ' + kode + '?')) return;
    tikets = tikets.filter(t => t.kode !== kode);
    applyFilters();
  }

  // Modal tambah
  function openModal() { document.getElementById('overlay').classList.add('active'); resetModal(); }
  function closeModal() { document.getElementById('overlay').classList.remove('active'); }
  function handleOverlayClick(e) { if(e.target===document.getElementById('overlay')) closeModal(); }
  function resetModal() {
    document.getElementById('orderSelect').value='';
    const cat=document.getElementById('categorySelect');
    cat.innerHTML='<option value="">— Pilih order terlebih dahulu —</option>'; cat.disabled=true;
    document.getElementById('seatField').classList.add('hidden');
    document.getElementById('seatSelect').innerHTML='<option value="">— Pilih Kursi —</option>';
    document.getElementById('kodePreview').value='';
  }
  function handleOrderChange() {
    const val=document.getElementById('orderSelect').value;
    const cat=document.getElementById('categorySelect');
    const sf=document.getElementById('seatField');
    const ss=document.getElementById('seatSelect');
    if(!val){resetModal();return;}
    const [orderId,customer,eventName,seating]=val.split('|');
    cat.innerHTML='<option value="">— Pilih Kategori —</option>';
    (kategoriMap[eventName]||[]).forEach(o=>{const opt=document.createElement('option');opt.textContent=o.label;opt.value=o.val;opt.disabled=o.disabled;if(o.disabled)opt.style.color='#ccc';cat.appendChild(opt);});
    cat.disabled=false;
    if(seating==='reserved'){sf.classList.remove('hidden');ss.innerHTML='<option value="">— Pilih Kursi —</option>';(seatMap[eventName]||[]).forEach(s=>{const opt=document.createElement('option');opt.textContent=s;opt.value=s;ss.appendChild(opt);});}
    else sf.classList.add('hidden');
    document.getElementById('kodePreview').value=generateKode();
  }
  function buatTiket() {
    const orderVal=document.getElementById('orderSelect').value;
    const katVal=document.getElementById('categorySelect').value;
    if(!orderVal||!katVal){alert('Harap lengkapi Order dan Kategori Tiket.');return;}
    const [orderId,customer,eventName,seating]=orderVal.split('|');
    const kursi=seating==='reserved'?document.getElementById('seatSelect').value:'—';
    const kode=document.getElementById('kodePreview').value||generateKode();
    tikets.unshift({kode,event:eventName,kategori:katVal,status:'valid',jadwal:'—',lokasi:'—',kursi,harga:'—',orderId,pelanggan:customer});
    closeModal(); applyFilters();
  }

  // Modal update status
  let updateTarget = '';
  function openUpdate(kode) {
    updateTarget=kode;
    const t=tikets.find(x=>x.kode===kode);
    document.getElementById('updateKode').value=kode;
    document.getElementById('updateStatus').value=t.status;
    document.getElementById('overlayUpdate').classList.add('active');
  }
  function closeUpdate() { document.getElementById('overlayUpdate').classList.remove('active'); }
  function simpanUpdate() {
    const st=document.getElementById('updateStatus').value;
    const t=tikets.find(x=>x.kode===updateTarget);
    if(t) t.status=st;
    closeUpdate(); applyFilters();
  }

  applyFilters();
</script>
</body>
</html>
