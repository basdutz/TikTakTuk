{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tiket Saya – TikTakTuk</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    html {
        overflow-y: scroll; 
        overscroll-behavior-y: none;
        overscroll-behavior-x: none;
    }

    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Nunito',sans-serif;background:#F9FAFB;min-height:100vh;padding:0;overflow-x:hidden;width: 100%;position: relative;}
    .wrap{width:100%;padding:24px 24px 32px;box-sizing: border-box;}

    /* PAGE HEADER */
    .page-header{margin-bottom:24px;}
    .page-header h1{font-size:24px;font-weight:900;color:#1a1a1a;margin-bottom:4px;}
    .page-header .sub{font-size:13px;color:#aaa;font-weight:600;}

    /* STATS */
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;}
    .scard{background:#fff;border-radius:14px;padding:20px 24px;box-shadow:0 2px 12px rgba(0,0,0,.06);display: flex;flex-direction: column;justify-content: center;min-width: 0;}
    .scard-label{font-size:11px;font-weight:800;color:#aaa;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;}
    .scard-val{font-size:28px;font-weight:900;color:#f47c20;line-height: 1;} /* Warna highlight */

    /* FILTERS */
    .filters{display:flex;gap:10px;margin-bottom:16px;}
    .search-box{flex:1;position:relative;}
    .search-box input{width:100%;padding:11px 14px 11px 40px;border:1.5px solid #e5e5e5;border-radius:12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;color:#333;outline:none;transition:all .15s;}
    .search-box input:focus{border-color:#f47c20; box-shadow: 0 0 0 3px rgba(244, 124, 32, 0.1);}
    .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#aaa;}
    .filter-select{padding:11px 14px;border:1.5px solid #e5e5e5;border-radius:12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;color:#555;background:#fff;outline:none;cursor:pointer;}
    .filter-select:focus{border-color:#f47c20;}

    /* TICKET CARDS */
    .tickets-list{display:flex;flex-direction:column;gap:14px;min-height: 400px;}
    .tkt-card{background:#fff;border-radius:18px;padding:24px;box-shadow:0 2px 15px rgba(0,0,0,.04);display:grid;grid-template-columns:56px 1fr auto;gap:20px;align-items:start; border: 1px solid #f0f0f0;}
    .tkt-icon{width:56px;height:56px;background:#fef3e8;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#f47c20;}
    
    .tkt-badges{display:flex;gap:6px;margin-bottom:8px;}
    .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;}
    .badge-valid{background:#d1fae5;color:#065f46;}
    .badge-terpakai{background:#fee2e2;color:#991b1b;}
    .badge-vip{background:#ede9fe;color:#5b21b6;}
    .badge-wvip{background:#fce7f3;color:#9d174d;}
    .badge-reg{background:#dbeafe;color:#1e40af;}
    .badge-ga{background:#fef3c7;color:#92400e;}

    .tkt-name{font-size:17px;font-weight:900;color:#1a1a1a;margin-bottom:4px;}
    .tkt-code{font-size:11px;color:#aaa;font-family:monospace;margin-bottom:16px;background:#f9f9f9;padding:2px 6px;border-radius:4px;display:inline-block;}

    .tkt-meta {display: grid;grid-template-columns: repeat(3, 1fr);gap: 12px 16px;width: 100%;}

    .meta-label {font-size: 10px;font-weight: 800;color: #aaa;text-transform: uppercase;letter-spacing: .5px;margin-bottom: 4px;}

    .meta-val {font-size: 13px;font-weight: 700;color: #444;display: block;           white-space: nowrap;      overflow: hidden;         text-overflow: ellipsis;  }

    .meta-val svg {color: #f47c20; opacity: 0.7;vertical-align: middle;margin-right: 4px;margin-top: -2px; }

    .tkt-actions{display:flex;gap:10px;margin-top:20px;padding-top:15px;border-top:1px dashed #eee;}
    .btn-qr{padding:8px 16px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;}
    .btn-qr:hover{background:#333;transform:translateY(-1px);}
    .btn-icon{width:36px;height:36px;border:1.5px solid #e5e5e5;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;color:#555;}
    .btn-icon:hover{border-color:#f47c20;color:#f47c20;background:#fffaf5;}

    .tkt-qr{display:flex;flex-direction:column;align-items:center;gap:6px;}
    .qr-box{width:72px;height:72px;background:#fff;border:1.5px solid #f0f0f0;border-radius:12px;display:flex;align-items:center;justify-content:center;padding:8px;}
    .qr-label{font-size:9px;font-weight:800;color:#aaa;text-transform:uppercase;letter-spacing:.5px;}

    .empty{text-align:center;padding:60px 24px;color:#aaa;font-weight:600;background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.03);}

    @media(max-width:700px){
      .stats{grid-template-columns:1fr 1fr 1fr;}
      .tkt-card{grid-template-columns:1fr; gap:12px;}
      .tkt-qr{display:none;}
      .tkt-meta{grid-template-columns:1fr 1fr;}
      .filters{flex-direction:column;}
    }
  </style>
</head>
<body>
{% include 'main/navbar.html' %}
<div class="wrap">

  <div class="page-header">
    <h1>Tiket Saya</h1>
    <div class="sub">Kelola dan akses semua tiket aktif Anda di TikTakTuk</div>
  </div>

  <div class="stats">
    <div class="scard"><div class="scard-label">Total</div><div class="scard-val" id="statTotal">0</div></div>
    <div class="scard"><div class="scard-label">Valid</div><div class="scard-val" id="statValid">0</div></div>
    <div class="scard"><div class="scard-label">Terpakai</div><div class="scard-val" id="statTerpakai">0</div></div>
  </div>

  <div class="filters">
    <div class="search-box">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Cari nama event atau kode tiket..." oninput="applyFilters()"/>
    </div>
    <select class="filter-select" id="filterStatus" onchange="applyFilters()">
      <option value="">Semua Status</option>
      <option value="valid">Valid</option>
      <option value="terpakai">Terpakai</option>
    </select>
  </div>

  <div class="tickets-list" id="ticketsList"></div>

</div>

<script>
  // DATA HARDCODE LENGKAP
  const tikets = [
    {kode:'TKT-SVT-VIP-001', event:'SEVENTEEN World Tour', kategori:'VIP', status:'valid', jadwal:'01 Des 2024, 19:00', lokasi:'Stadium A, Cityville', kursi:'VIP-A1', harga:'Rp 4.000.000', orderId:'ORD-001', pelanggan:'nisyyah'},
    {kode:'TKT-HS-BAL-012', event:'Harry Styles Live', kategori:'Balcony', status:'valid', jadwal:'15 Nov 2024, 20:00', lokasi:'Arena B, Townsburg', kursi:'BAL-C12', harga:'Rp 3.000.000', orderId:'ORD-002', pelanggan:'bluey'},
    {kode:'TKT-TR-REG-045', event:'The Rose Concert', kategori:'Regular', status:'terpakai', jadwal:'20 Okt 2024, 18:30', lokasi:'Theater C, Villageton', kursi:'REG-F45', harga:'Rp 1.500.000', orderId:'ORD-003', pelanggan:'mabel'},
    {kode:'TKT-ADL-EB-008', event:'Adele Live', kategori:'Early Bird', status:'terpakai', jadwal:'05 Sep 2024, 19:30', lokasi:'Concert Hall D, Metropolis', kursi:'—', harga:'Rp 750.000', orderId:'ORD-004', pelanggan:'harry'}
  ];

  const badgeKat = {
    'VIP':'badge-vip',
    'Regular':'badge-reg',
    'Premium': 'badge-wvip',
    'Balcony': 'badge-ga',
    'Early Bird': 'badge-valid',
    'Student': 'badge-reg',
    'Family Pack': 'badge-vip',
    'Group Discount': 'badge-ga',
    'Last Minute': 'badge-terpakai'
  };

  // Fungsi membuat QR Sederhana via SVG
  function qrSVG() {
    return `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 3h6v6H3V3zm12 0h6v6h-6V3zM3 15h6v6H3v-6zm12 5h1v1h-1v-1zm1 1h1v1h-1v-1zm1-1h1v1h-1v-1zm-1-1h1v1h-1v-1zm3 0h1v1h-1v-1zm-1 1h1v1h-1v-1zm1 1h1v1h-1v-1z" fill="#1a1a1a"/>
      <path d="M5 5h2v2H5V5zm14 0h2v2h-2V5zM5 17h2v2H5v-2z" fill="#1a1a1a"/>
      <rect x="15" y="15" width="2" height="2" fill="#1a1a1a"/>
    </svg>`;
  }

  function cardHTML(t) {
    const statusBadge = t.status === 'valid'
      ? '<span class="badge badge-valid">Valid</span>'
      : '<span class="badge badge-terpakai">Terpakai</span>';
    
    const katBadge = `<span class="badge ${badgeKat[t.kategori] || ''}">${t.kategori}</span>`;

    return `
    <div class="tkt-card">
      <div class="tkt-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/>
          <line x1="13" y1="5" x2="13" y2="19"/>
        </svg>
      </div>
      <div class="tkt-main">
        <div class="tkt-badges">${statusBadge}${katBadge}</div>
        <div class="tkt-name">${t.event}</div>
        <div class="tkt-code">${t.kode}</div>
        <div class="tkt-meta">
          <div class="meta-item">
            <div class="meta-label">Jadwal</div>
            <div class="meta-val">${t.jadwal}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Lokasi</div>
            <div class="meta-val">${t.lokasi}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Kursi</div>
            <div class="meta-val">${t.kursi}</div>
          </div>
        </div>
        <div class="tkt-actions">
          <button class="btn-qr">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3"/></svg>
            Tampilkan QR
          </button>
          <div class="btn-icon" title="Download Tiket">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </div>
          <div class="btn-icon" title="Bagikan">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          </div>
        </div>
      </div>
      <div class="tkt-qr">
        <div class="qr-box">${qrSVG()}</div>
        <div class="qr-label">Scan Entry</div>
      </div>
    </div>`;
  }

  function applyFilters() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const st = document.getElementById('filterStatus').value;
    
    const result = tikets.filter(t =>
      (!q || t.event.toLowerCase().includes(q) || t.kode.toLowerCase().includes(q)) &&
      (!st || t.status === st)
    );

    // Update Stats Secara Realtime
    document.getElementById('statTotal').textContent = result.length;
    document.getElementById('statValid').textContent = result.filter(t => t.status === 'valid').length;
    document.getElementById('statTerpakai').textContent = result.filter(t => t.status === 'terpakai').length;

    // Render ke dalam List
    const list = document.getElementById('ticketsList');
    list.style.opacity = "0.5";

    setTimeout(() => {
        list.innerHTML = result.length
            ? result.map(cardHTML).join('')
            : '<div class="empty">Oops! Tidak ada tiket yang sesuai.</div>';
        list.style.opacity = "1"; // Kembali terang
    }, 50);
}

  // Jalankan saat pertama kali halaman dibuka
  applyFilters();
</script>
</body>
</html>
