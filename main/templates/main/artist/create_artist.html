<div class="modal-overlay" id="createModal">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('createModal')">✕</button>
        <h2>Tambah Artis Baru</h2>

        <label>Nama Artis</label>
        <input id="createName" class="input" placeholder="cth. Taylor Swift">

        <label>Genre</label>
        <input id="createGenre" class="input" placeholder="cth. Pop">

        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal('createModal')">Batal</button>
            <button class="btn btn-primary" onclick="submitCreate()">Tambah</button>
        </div>
    </div>
</div>
