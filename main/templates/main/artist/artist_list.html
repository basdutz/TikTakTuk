<!DOCTYPE html>

        * {
            box-sizing: border-box;

            max-width: 1100px;

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;

        }

        .btn {
            padding: 8px 14px;
            border-radius: 8px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: #f47c20;
            color: white;
        }

        .btn-primary:hover {
            background: #e56f16;
        }

        .card {
            background: white;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        }

        .table-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .search input {
            padding: 12px 16px;
            border-radius: 999px;
            border: 1px solid #eee;
            background: #fafafa;
            min-width: 280px;
            outline: none;
            transition: all 0.2s ease;
        }

        .search input:focus {
            border-color: #f47c20;
            background: #fff;
        }

        .meta {
            font-size: 13px;
            color: #888;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        thead {
            background: #f47c20;
            color: white;
        }

        th,
        td {
            padding: 18px 16px;
            text-align: center;
            vertical-align: middle;
        }

        th:first-child {
            border-top-left-radius: 12px;
        }

        th:last-child {
            border-top-right-radius: 12px;
        }

        tbody tr {
            border-bottom: 1px solid #f3f3f3;
            transition: background 0.2s ease;
        }

        tbody tr:hover {
            background: #fff3e8;
        }

        th:nth-child(1),
        td:nth-child(1) {
            width: 32%;
            word-break: break-word;
        }

        th:nth-child(2),
        td:nth-child(2) {
            width: 28%;
        }

        th:nth-child(3),
        td:nth-child(3) {
            width: 20%;
        }

            {
            % if is_admin %
        }

        th:nth-child(4),
        td:nth-child(4) {
            width: 20%;
        }

            {
            % endif %
        }

        .badge {
            display: inline-block;
            max-width: 100%;
            padding: 6px 12px;
            border-radius: 999px;
            background: #fff3e8;
            color: #f47c20;
            font-weight: 700;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .action-buttons {
            display: flex;
            flex-direction: row;
            gap: 10px;
            align-items: center;
            justify-content: center;
            flex-wrap: nowrap;
        }

        .action-buttons .btn {
            min-width: 80px;
            padding: 8px 16px;
        }

        .btn-edit {
            background: #f3f3f3;
            color: #333;
        }

        .btn-edit:hover {
            background: #e8e8e8;
        }

        .btn-delete {
            background: #ffe5e5;
            color: #d60000;
        }

        .btn-delete:hover {
            background: #ffd4d4;
        }

        .pagination-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #f1f1f1;
            gap: 16px;
            flex-wrap: wrap;
        }

        .pagination-btn {
            padding: 10px 18px;
            border: 1px solid #e5e5e5;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s ease;
        }

        .pagination-btn:hover:not(:disabled) {
            border-color: #f47c20;
            color: #f47c20;
        }

        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination-info {
            font-size: 14px;
            font-weight: 700;
            color: #666;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .modal {
            background: #ffffff;
            width: 520px;
            border-radius: 24px;
            padding: 32px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .modal h2 {
            margin-top: 0;
        }

        .modal-close {
            position: absolute;
            right: 18px;
            top: 16px;
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            color: #888;
            font-size: 18px;
            padding: 0;
            transition: background 0.15s, color 0.15s;
        }

        .modal-close:hover {
            background: #f3f3f3;
            color: #333;
        }

        .modal label {
            display: block;
            font-weight: 700;
            color: #f26522;
            margin-top: 16px;
            margin-bottom: 8px;
        }

        .modal label::after {
            content: " *";
            color: red;
        }

        .input {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: 2px solid #e5e5e5;
            background: #fafafa;
            font-size: 15px;
            outline: none;
        }

        .input::placeholder {
            color: #9e9e9e;
        }

        .input:focus {
            border-color: #f47c20;
            background: #fff;
        }

        .modal-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 24px;
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid #444;
            color: black;
        }

        .btn-danger {
            background: #d60000;
            color: white;
        }

        .delete-info {
            background: #fafafa;
            border: 1px solid #f0e0e0;
            border-radius: 12px;
            padding: 12px 16px;
            margin: 12px 0;
            font-size: 14px;
        }
    </style>
</head>

<body>
    {% include 'main/navbar.html' %}

    <div class="page">
        <div class="page-header">
            <h2>Daftar Artis</h2>
            {% if is_admin %}
            <button class="btn btn-primary" onclick="openModal('createModal')">
                + Tambah Artist
            </button>
            {% endif %}
        </div>

        <div class="card">
            <div class="table-top">
                <div class="search">
                    <input type="text" id="search" placeholder="Cari artis..." oninput="filterData()">
                </div>
                <div class="meta" id="count"></div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nama</th>
                        <th>Genre</th>
                        {% if is_admin %}<th>Aksi</th>{% endif %}
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>

            <div class="pagination-container">
                <button class="pagination-btn" id="prevBtn" onclick="changePage(-1)">
                    ← Sebelumnya
                </button>

                <div class="pagination-info" id="pageInfo"></div>

                <button class="pagination-btn" id="nextBtn" onclick="changePage(1)">
                    Selanjutnya →
                </button>
            </div>
        </div>
    </div>

    <script>
        const IS_ADMIN = {% if is_admin %}true{% else %} false{% endif %};

        let data = [
            { id: 'a1b2c3d4-0001-4000-a000-000000000001', name: 'SEVENTEEN', genre: 'K-Pop' },
            { id: 'a1b2c3d4-0002-4000-a000-000000000002', name: 'Harry Styles', genre: 'Pop' },
            { id: 'a1b2c3d4-0003-4000-a000-000000000003', name: 'The Rose', genre: 'Indie Rock' },
            { id: 'a1b2c3d4-0004-4000-a000-000000000004', name: 'Adele', genre: 'Soul' },
            { id: 'a1b2c3d4-0005-4000-a000-000000000005', name: 'Coldplay', genre: 'Alternative Rock' },
            { id: 'a1b2c3d4-0006-4000-a000-000000000006', name: 'Taylor Swift', genre: 'Pop' },
            { id: 'a1b2c3d4-0007-4000-a000-000000000007', name: 'Bruno Mars', genre: 'Funk Pop' },
            { id: 'a1b2c3d4-0008-4000-a000-000000000008', name: 'Billie Eilish', genre: 'Alternative Pop' },
            { id: 'a1b2c3d4-0011-4000-a000-000000000011', name: 'Arctic Monkeys', genre: 'Indie Rock' }
        ];

        let filtered = [...data];
        let currentPage = 1;
        const rowsPerPage = 10;

        function render() {
            const tbody = document.getElementById("tableBody");
            tbody.innerHTML = "";

            const start = (currentPage - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const paginatedData = filtered.slice(start, end);

            paginatedData.forEach((d, index) => {
                let action = IS_ADMIN ? `
                    <td>
                        <div class="action-buttons">
                            <button class="btn btn-edit" onclick="openEdit(${index})">Edit</button>
                            <button class="btn btn-delete" onclick="openDelete(${index})">Hapus</button>
                        </div>
                    </td>` : "";

                tbody.innerHTML += `
                    <tr>
                        <td>${d.id}</td>
                        <td>${d.name}</td>
                        <td><span class="badge">${d.genre}</span></td>
                        ${action}
                    </tr>`;
            });

            document.getElementById("count").innerText = `${filtered.length} artis ditemukan`;
            document.getElementById("pageInfo").innerText = `Halaman 1 dari 1`;
            document.getElementById("prevBtn").disabled = true;
            document.getElementById("nextBtn").disabled = true;
        }

        function filterData() {
            let q = document.getElementById("search").value.toLowerCase();
            filtered = data.filter(d =>
                d.name.toLowerCase().includes(q) ||
                d.genre.toLowerCase().includes(q)
            );
            render();
        }

        function changePage(direction) {
            const totalPages = Math.ceil(filtered.length / rowsPerPage);
            currentPage += direction;

            if (currentPage < 1) currentPage = 1;
            if (currentPage > totalPages) currentPage = totalPages;

            render();
        }

        function openModal(id) {
            document.getElementById(id).style.display = "flex";
        }

        function closeModal(id) {
            document.getElementById(id).style.display = "none";
        }

        function openEdit(index) {
            const data = filtered[index];
            document.getElementById("editName").value = data.name;
            document.getElementById("editGenre").value = data.genre;
            openModal("editModal");
        }

        function openDelete(index) {
            const data = filtered[index];
            document.getElementById("deleteId").innerText = data.id;
            document.getElementById("deleteName").innerText = data.name;
            openModal("deleteModal");
        }

        render();
    </script>

    {% include 'main/artist/create_artist.html' %}
    {% include 'main/artist/edit_artist.html' %}
    {% include 'main/artist/delete_artist.html' %}
</body>

</html>
