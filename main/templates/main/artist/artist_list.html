{% load static %}
<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Daftar Artis</title>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            background: #fffdf7;
        }

        /* Layout */
        .page {
            max-width: 1100px;
            margin: auto;
            padding: 30px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Button */
        .btn {
            padding: 8px 14px;
            border-radius: 8px;
            border: none;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-primary {
            background: #f47c20;
            color: white;
        }

        /* Card */
        .card {
            background: white;
            padding: 20px;
            border-radius: 16px;
        }

        /* Table */
        .table-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .search input {
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid #eee;
            background: #fafafa;
        }

        .meta {
            font-size: 13px;
            color: #aaa;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #f47c20;
            color: white;
        }

        th,
        td {
            padding: 14px;
            text-align: center;
        }

        tbody tr:hover {
            background: #fff3e8;
        }

        /* Badge */
        .badge {
            padding: 4px 10px;
            border-radius: 999px;
            background: #fff3e8;
            color: #f47c20;
            font-weight: 700;
            font-size: 12px;
        }

        /* Actions */
        .btn-edit {
            background: #f3f3f3;
        }

        .btn-delete {
            background: #ffe5e5;
            color: red;
        }
    </style>
</head>

<body>

    {% include 'main/navbar.html' %}

    <div class="page">

        <div class="page-header">
            <h2>Daftar Artis</h2>
            {% if is_admin %}
            <button class="btn btn-primary">+ Tambah Artist</button>
            {% endif %}
        </div>

        <div class="card">

            <div class="table-top">
                <div class="search">
                    <input type="text" id="search" placeholder="Cari artis..." oninput="filterData()">
                </div>
                <div class="meta" id="count"></div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nama</th>
                        <th>Genre</th>
                        {% if is_admin %}<th>Aksi</th>{% endif %}
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>

        </div>
    </div>

    <script>
        const IS_ADMIN = {% if is_admin %}true{% else %} false{% endif %};

        let data = [
            { id: 'a1b2c3d4-0001-4000-a000-000000000001', name: 'SEVENTEEN', genre: 'K-Pop' },
            { id: 'a1b2c3d4-0002-4000-a000-000000000002', name: 'Harry Styles', genre: 'Pop' },
            { id: 'a1b2c3d4-0003-4000-a000-000000000003', name: 'The Rose', genre: 'Indie Rock' },
            { id: 'a1b2c3d4-0004-4000-a000-000000000004', name: 'Adele', genre: 'Soul' },
            { id: 'a1b2c3d4-0005-4000-a000-000000000005', name: 'Coldplay', genre: 'Alternative Rock' },
            { id: 'a1b2c3d4-0006-4000-a000-000000000006', name: 'Taylor Swift', genre: 'Pop' },
            { id: 'a1b2c3d4-0007-4000-a000-000000000007', name: 'Bruno Mars', genre: 'Funk Pop' },
            { id: 'a1b2c3d4-0008-4000-a000-000000000008', name: 'Billie Eilish', genre: 'Alternative Pop' },
            { id: 'a1b2c3d4-0011-4000-a000-000000000011', name: 'Arctic Monkeys', genre: 'Indie Rock' }
        ];

        let filtered = [...data];

        function render() {
            const tbody = document.getElementById("tableBody");
            tbody.innerHTML = "";

            filtered.forEach(d => {
                let action = IS_ADMIN ? `
        <td>
            <button class="btn btn-edit">Edit</button>
            <button class="btn btn-delete">Hapus</button>
        </td>` : "";

                tbody.innerHTML += `
        <tr>
            <td>${d.id}</td>
            <td>${d.name}</td>
            <td><span class="badge">${d.genre}</span></td>
            ${action}
        </tr>`;
            });

            document.getElementById("count").innerText =
                `${filtered.length} artis ditemukan`;
        }

        function filterData() {
            let q = document.getElementById("search").value.toLowerCase();
            filtered = data.filter(d =>
                d.name.toLowerCase().includes(q) ||
                d.genre.toLowerCase().includes(q)
            );
            render();
        }

        render();
    </script>

</body>

</html>
