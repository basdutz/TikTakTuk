<div class="modal-overlay" id="createModal">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('createModal')">✕</button>
        <h2>Tambah Kategori Baru</h2>

        <label>Nama Acara</label>
        <select class="input" id="createEventSelect"></select>

        <label>Kategori</label>
        <input class="input" id="createName" placeholder="cth. VVIP">

        <div style="display: flex; gap: 16px;">
            <div style="flex: 1;">
                <label>Harga (Rp)</label>
                <input class="input" id="createPrice" type="number" placeholder="2500000">
            </div>
            <div style="flex: 1;">
                <label>Kuota</label>
                <input class="input" id="createQuota" type="number" placeholder="450">
            </div>
        </div>

        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal('createModal')">Batal</button>
            <button class="btn btn-primary" onclick="submitCreateCategory()">Tambah</button>
        </div>
    </div>
</div>
