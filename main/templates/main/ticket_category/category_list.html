{% load static %}
<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Ticket Category</title>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            background: #fffdf7;
        }

        .page {
            max-width: 1200px;
            margin: auto;
            padding: 30px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Buttons */
        .btn {
            padding: 8px 14px;
            border-radius: 8px;
            border: none;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-primary {
            background: #f47c20;
            color: white;
        }

        .btn-edit {
            background: #f3f3f3;
        }

        .btn-delete {
            background: #ffe5e5;
            color: red;
        }

        /* Cards */
        .card {
            background: white;
            padding: 20px;
            border-radius: 16px;
        }

        /* Summary */
        .summary {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }

        .summary-card {
            flex: 1;
            text-align: center;
        }

        .summary-title {
            font-size: 12px;
            color: #aaa;
        }

        .summary-value {
            font-size: 24px;
            font-weight: 800;
            color: #f47c20;
        }

        /* Table */
        .table-top {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .search input {
            padding: 10px;
            border-radius: 999px;
            border: 1px solid #eee;
        }

        .meta {
            font-size: 13px;
            color: #aaa;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #f47c20;
            color: white;
        }

        th,
        td {
            padding: 14px;
            text-align: center;
        }

        tbody tr:hover {
            background: #fff3e8;
        }

        /* Badge */
        .badge {
            padding: 4px 10px;
            border-radius: 999px;
            background: #fff3e8;
            color: #f47c20;
            font-weight: 700;
            font-size: 12px;
        }

        /* Price */
        .price {
            font-weight: 800;
            color: #f47c20;
        }

        /* Quota bar */
        .bar {
            height: 6px;
            background: #eee;
            border-radius: 10px;
        }

        .fill {
            height: 100%;
            background: #f47c20;
        }
    </style>
</head>

<body>

    {% include 'main/navbar.html' %}

    <div class="page">

        <div class="page-header">
            <h2>Daftar Kategori Tiket</h2>
            {% if is_admin or is_organizer %}
            <button class="btn btn-primary">+ Tambah Kategori</button>
            {% endif %}
        </div>

        <!-- Summary -->
        <div class="summary">
            <div class="card summary-card">
                <div class="summary-title">TOTAL</div>
                <div class="summary-value" id="total"></div>
            </div>
            <div class="card summary-card">
                <div class="summary-title">KUOTA</div>
                <div class="summary-value" id="quota"></div>
            </div>
            <div class="card summary-card">
                <div class="summary-title">HARGA MAX</div>
                <div class="summary-value" id="max"></div>
            </div>
        </div>

        <div class="card">

            <div class="table-top">
                <div class="search">
                    <input type="text" id="search" placeholder="Cari kategori..." oninput="filterData()">
                </div>
                <div class="meta" id="count"></div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Kategori</th>
                        <th>Event</th>
                        <th>Harga</th>
                        <th>Kuota</th>
                        {% if is_admin or is_organizer %}<th>Aksi</th>{% endif %}
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>

        </div>
    </div>

    <script>
        const IS_ADMIN = {% if is_admin or is_organizer %}true{% else %} false{% endif %};

        let data = [
            {
                id: 'c1d2e3f4-0001-4000-a000-000000000001',
                name: 'VIP',
                quota: 100,
                price: 4000000,
                event_id: 'e1f2g3h4-0001-4000-a000-000000000001'
            },
            {
                id: 'c1d2e3f4-0002-4000-a000-000000000002',
                name: 'Regular',
                quota: 500,
                price: 2500000,
                event_id: 'e1f2g3h4-0001-4000-a000-000000000001'
            },
            {
                id: 'c1d2e3f4-0003-4000-a000-000000000003',
                name: 'Balcony',
                quota: 200,
                price: 3000000,
                event_id: 'e1f2g3h4-0002-4000-a000-000000000002'
            },
            {
                id: 'c1d2e3f4-0004-4000-a000-000000000004',
                name: 'Regular',
                quota: 1000,
                price: 1500000,
                event_id: 'e1f2g3h4-0003-4000-a000-000000000003'
            },
            {
                id: 'c1d2e3f4-0005-4000-a000-000000000005',
                name: 'Early Bird',
                quota: 150,
                price: 750000,
                event_id: 'e1f2g3h4-0004-4000-a000-000000000004'
            },
            {
                id: 'c1d2e3f4-0006-4000-a000-000000000006',
                name: 'Premium',
                quota: 50,
                price: 4000000,
                event_id: 'e1f2g3h4-0005-4000-a000-000000000005'
            },
            {
                id: 'c1d2e3f4-0007-4000-a000-000000000007',
                name: 'Regular',
                quota: 300,
                price: 1200000,
                event_id: 'e1f2g3h4-0006-4000-a000-000000000006'
            },
            {
                id: 'c1d2e3f4-0008-4000-a000-000000000008',
                name: 'Student',
                quota: 200,
                price: 750000,
                event_id: 'e1f2g3h4-0007-4000-a000-000000000007'
            },
            {
                id: 'c1d2e3f4-0009-4000-a000-000000000009',
                name: 'Family Pack',
                quota: 100,
                price: 8000000,
                event_id: 'e1f2g3h4-0008-4000-a000-000000000006'
            },
            {
                id: 'c1d2e3f4-0010-4000-a000-000000000010',
                name: 'Group Discount',
                quota: 200,
                price: 7500000,
                event_id: 'e1f2g3h4-0009-4000-a000-000000000003'
            },
            {
                id: 'c1d2e3f4-0011-4000-a000-000000000011',
                name: 'Last Minute',
                quota: 50,
                price: 2200000,
                event_id: 'e1f2g3h4-0010-4000-a000-000000000004'
            },
            {
                id: 'c1d2e3f4-0012-4000-a000-000000000012',
                name: 'VIP',
                quota: 20,
                price: 3500000,
                event_id: 'e1f2g3h4-0011-4000-a000-000000000005'
            },
            {
                id: 'c1d2e3f4-0014-4000-a000-000000000014',
                name: 'Balcony',
                quota: 10,
                price: 3000000,
                event_id: 'e1f2g3h4-0013-4000-a000-000000000001'
            },
            {
                id: 'c1d2e3f4-0015-4000-a000-000000000015',
                name: 'Regular',
                quota: 500,
                price: 1000000,
                event_id: 'e1f2g3h4-0014-4000-a000-000000000002'
            }
        ];

        let filtered = [...data];

        function render() {
            const tbody = document.getElementById("tableBody");
            tbody.innerHTML = "";

            filtered.forEach(d => {
                let action = IS_ADMIN ? `
        <td>
            <button class="btn btn-edit">Edit</button>
            <button class="btn btn-delete">Hapus</button>
        </td>` : "";

                tbody.innerHTML += `
        <tr>
            <td>${d.id}</td>
            <td><span class="badge">${d.name}</span></td>
            <td>${d.event}</td>
            <td class="price">Rp ${d.price}</td>
            <td>
                <div class="bar">
                    <div class="fill" style="width:${d.quota / 10}%"></div>
                </div>
                <small>${d.quota}</small>
            </td>
            ${action}
        </tr>`;
            });

            updateStats();
        }

        function updateStats() {
            document.getElementById("total").innerText = filtered.length;

            let q = filtered.reduce((a, b) => a + b.quota, 0);
            document.getElementById("quota").innerText = q;

            let m = Math.max(...filtered.map(d => d.price));
            document.getElementById("max").innerText = "Rp " + m;

            document.getElementById("count").innerText =
                `${filtered.length} kategori ditemukan`;
        }

        function filterData() {
            let q = document.getElementById("search").value.toLowerCase();
            filtered = data.filter(d =>
                d.name.toLowerCase().includes(q) ||
                d.event.toLowerCase().includes(q)
            );
            render();
        }

        render();
    </script>

</body>

</html>
